<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Pressão em Tempo Real</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 400px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; font-size: 24px; }
        .status {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .display-pressao {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        .unidade { font-size: 16px; color: #7f8c8d; font-weight: normal; }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .btn:hover { background-color: #2980b9; }
        .btn.parar { background-color: #e74c3c; }
        .btn.parar:hover { background-color: #c0392b; }
        .historico {
            margin-top: 25px;
            text-align: left;
        }
        .historico h3 { border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .lista-leituras {
            list-style: none;
            padding: 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .lista-leituras li {
            padding: 8px 0;
            border-bottom: 1px solid #f9f9f9;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Pressão RT 🩺</h1>
    <div class="status" id="status-conexao">🔴 Desconectado (Simulação)</div>
    
    <div class="display-pressao" id="valores-pressao">
        -- / --
        <span class="unidade">mmHg</span>
    </div>

    <button class="btn" id="btn-monitorar" onclick="alternarMonitoramento()">Iniciar Monitoramento</button>

    <div class="historico">
        <h3>Últimas Leituras salvas:</h3>
        <ul class="lista-leituras" id="lista-historico">
            </ul>
    </div>
</div>

<script>
    let intervalo = null;
    let monitorando = false;

    function alternarMonitoramento() {
        const btn = document.getElementById('btn-monitorar');
        const status = document.getElementById('status-conexao');
        const display = document.getElementById('valores-pressao');

        if (!monitorando) {
            // Iniciar simulação de tempo real
            monitorando = true;
            btn.innerText = "Parar e Salvar";
            btn.classList.add('parar');
            status.innerText = "🟢 Monitorando em tempo real...";
            status.style.color = "green";

            intervalo = setInterval(() => {
                // Simula pequenas variações em tempo real (Sistólica entre 115-125, Diastólica entre 75-85)
                let sis = Math.floor(Math.random() * (125 - 115 + 1)) + 115;
                let dia = Math.floor(Math.random() * (85 - 75 + 1)) + 75;
                display.innerHTML = `${sis} / ${dia} <span class="unidade">mmHg</span>`;
            }, 1000); // Atualiza a cada 1 segundo

        } else {
            // Parar monitoramento
            monitorando = false;
            btn.innerText = "Iniciar Monitoramento";
            btn.classList.remove('parar');
            status.innerText = "🔴 Monitoramento pausado";
            status.style.color = "#666";
            
            clearInterval(intervalo);
            salvarNoHistorico(display.innerText.replace(' mmHg', ''));
        }
    }

    function salvarNoHistorico(valor) {
        if(valor.includes('--')) return;
        
        const lista = document.getElementById('lista-historico');
        const li = document.createElement('li');
        const agora = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        li.innerHTML = `<span><strong>${valor}</strong> mmHg</span> <span>${agora}</span>`;
        lista.insertBefore(li, lista.firstChild);
    }
</script>

</body>
</html>
